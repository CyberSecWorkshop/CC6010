:root{
  --bg:#f7f6f2;--card:#ffffff;--border:#dddbd4;
  --ok:#1a6b3c;--ok-bg:#edf7f1;--ok-bd:#a8d5bc;
  --no:#b01c1c;--no-bg:#fdf0f0;--no-bd:#f0b8b8;
  --rv:#1a5c6b;--rv-bg:#edf5f7;--rv-bd:#a8cfd8;
  --text:#1a1a1a;--muted:#7a7870;
  --mono:'IBM Plex Mono',monospace;--serif:'DM Serif Display',serif;--sans:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;padding:2.5rem 1rem 5rem;}
header{text-align:center;max-width:700px;margin:0 auto 2.5rem;border-bottom:1.5px solid var(--border);padding-bottom:1.8rem;}
.tag{display:inline-block;font-family:var(--mono);font-size:.6rem;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-bottom:.9rem;}
h1{font-family:var(--serif);font-size:clamp(1.8rem,4vw,2.8rem);font-weight:400;line-height:1.15;margin-bottom:.3rem;}
.sub{color:var(--muted);font-size:.82rem;font-family:var(--mono);}
.meta{max-width:700px;margin:.5rem auto;display:flex;justify-content:space-between;font-family:var(--mono);font-size:.68rem;color:var(--muted);}
.bar{max-width:700px;margin:0 auto 2rem;height:2px;background:var(--border);border-radius:1px;}
.fill{height:100%;background:var(--text);width:0%;transition:width .4s;}
.sec-hd{max-width:700px;margin:2rem auto .8rem;display:flex;align-items:center;gap:.8rem;}
.sec-lbl{font-family:var(--mono);font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);padding:2px 8px;border:1px solid var(--border);border-radius:2px;white-space:nowrap;}
.sec-line{flex:1;height:1px;background:var(--border);}
.wrap{max-width:700px;margin:0 auto;display:flex;flex-direction:column;gap:.9rem;}
.card{background:var(--card);border:1px solid var(--border);border-radius:5px;padding:1.3rem 1.4rem 1.3rem 1.6rem;position:relative;transition:border-color .2s;}
.card::before{content:'';position:absolute;left:0;top:0;width:3px;height:100%;background:var(--border);border-radius:5px 0 0 5px;transition:background .25s;}
.card.c-ok::before{background:var(--ok);}
.card.c-no::before{background:var(--no);}
.card.c-ok{border-color:var(--ok-bd);}
.card.c-no{border-color:var(--no-bd);}
.qnum{font-family:var(--mono);font-size:.58rem;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:.5rem;}
.qtext{font-size:.94rem;font-weight:500;line-height:1.5;margin-bottom:.9rem;}
.opts{display:flex;flex-direction:column;gap:.4rem;}
.opt{display:flex;align-items:flex-start;gap:.65rem;padding:.6rem .85rem;border:1px solid var(--border);border-radius:4px;cursor:pointer;background:var(--bg);font-size:.85rem;color:var(--text);text-align:left;line-height:1.4;width:100%;transition:all .15s;font-family:var(--sans);}
.opt:hover:not(:disabled){border-color:var(--text);background:#f0efe9;}
.opt:disabled{cursor:default;}
.ltr{font-family:var(--mono);font-size:.62rem;color:var(--muted);min-width:1rem;padding-top:1px;flex-shrink:0;}
.opt.ok{border-color:var(--ok-bd);background:var(--ok-bg);color:var(--ok);}
.opt.ok .ltr{color:var(--ok);}
.opt.no{border-color:var(--no-bd);background:var(--no-bg);color:var(--no);}
.opt.no .ltr{color:var(--no);}
.opt.rv{border-color:var(--rv-bd);background:var(--rv-bg);color:var(--rv);}
.opt.rv .ltr{color:var(--rv);}
.fb{margin-top:.8rem;padding:.65rem .9rem;border-radius:3px;font-family:var(--mono);font-size:.72rem;line-height:1.6;display:none;border-left:3px solid;}
.fb.show{display:block;}
.fb.f-ok{border-color:var(--ok);background:var(--ok-bg);color:var(--ok);}
.fb.f-no{border-color:var(--no);background:var(--no-bg);color:var(--no);}
.panel{max-width:700px;margin:2rem auto 0;background:var(--card);border:1px solid var(--border);border-radius:5px;padding:2.5rem 2rem;text-align:center;display:none;}
.panel.show{display:block;}
.big{font-family:var(--serif);font-size:4rem;font-weight:400;line-height:1;margin-bottom:.3rem;}
.plbl{color:var(--muted);font-size:.72rem;font-family:var(--mono);letter-spacing:.1em;margin-bottom:1.2rem;text-transform:uppercase;}
.badge{display:inline-block;padding:5px 18px;border-radius:3px;font-family:var(--mono);font-size:.7rem;letter-spacing:.12em;margin-bottom:1.5rem;text-transform:uppercase;border:1px solid;}
.rbtn{background:var(--text);border:none;color:#fff;font-family:var(--mono);font-size:.72rem;padding:10px 26px;border-radius:3px;cursor:pointer;letter-spacing:.1em;transition:opacity .2s;text-transform:uppercase;}
.rbtn:hover{opacity:.75;}

<script>
const sections=[{"label": "E-Discovery", "start": 0}, {"label": "Memory Forensics", "start": 10}, {"label": "Incident Response", "start": 20}, {"label": "Risk Assessment & Management", "start": 30}, {"label": "Bitcoin & Cryptocurrency Forensics", "start": 40}, {"label": "Malware & Computer Security", "start": 50}, {"label": "Cloud Storage Forensics", "start": 60}, {"label": "Physical Security & Authentication", "start": 70}];
const Q=[{"q":"What is 'discovery' in the legal context?","o":["A post-trial review of all digital evidence collected","The formal submission of evidence to a court during trial","A pretrial process where each party requests relevant information and documents from the other side","Scientific analysis of digital evidence after a crime is confirmed, which is the standard approach used by most organisations"],"a":2,"e":"Discovery is the pretrial process during which each party requests relevant information and documents from the other side in an attempt to discover pertinent facts before trial."},{"q":"What does e-discovery involve?","o":["Court-ordered encryption of all digital evidence before submission, which is the standard approach used by most organisations","The investigation of cybercrime by law enforcement only","Automatic deletion of company records after a retention period","The access and use of information, data, and records created or maintained in electronic media"],"a":3,"e":"E-discovery involves the access and use of information, data, and records created or maintained in electronic media. It covers all digital sources of evidence beyond paper documents."},{"q":"What is spoliation?","o":["The destruction of potential evidence, whether intentional or through normal operations","The format in which documents must be produced for court","The cost-shifting process that moves discovery expenses to the requester, which is the standard approach used by most organisations","A reasonable search conducted across all relevant systems"],"a":0,"e":"Spoliation is the destruction of potential evidence. Normal computer operations — database updates, file overwrites — can cause spoliation. Intentional spoliation carries serious legal consequences."},{"q":"What are the four key e-discovery issues identified in the lecture?","o":["Spoliation, cost shifting, reasonable search, and form and format","Metadata, encryption, backup, and redaction","Authentication, admissibility, chain of custody, and preservation, which is the standard approach used by most organisations","Indexing, sampling, production, and review"],"a":0,"e":"The four key e-discovery issues are: Spoliation (evidence destruction), Cost Shifting (who pays), Reasonable Search (adequacy of search), and Form and Format (how documents are produced)."},{"q":"Why do lawyers rely on Boolean and keyword searches during e-discovery?","o":["Large volumes of e-records make purely human review impractical and expensive","Keyword results are automatically admissible without further human review","Courts require all keyword searches to be filed as part of the discovery record","Boolean searches automatically detect and flag spoliation across systems"],"a":0,"e":"Large volumes of e-records make human-only review problematic. Computers are cheaper and more accurate at repetitive document examination, so lawyers rely on Boolean and keyword searches."},{"q":"What advantage does e-data have over hard copy evidence?","o":["Courts automatically give greater legal weight to electronic evidence","E-data reveals hidden comments, prior versions, and modification history that hard copies cannot","E-data requires no chain of custody documentation","E-data can be transmitted instantly between parties without court approval, which is the standard approach used by most organisations"],"a":1,"e":"Hard copy versions are incomplete — they do not reveal modification history. E-data reveals hidden comments, prior versions, and changes, making it far richer evidence than paper copies."},{"q":"What disciplines beyond law are required for e-discovery?","o":["Accounting, project management, and database administration, which is the standard approach used by most organisations","Computer forensics, network forensics, and records management","Data science, machine learning, and cloud computing","Cryptography, network engineering, and software development"],"a":1,"e":"The lecture states that e-discovery involves knowledge of non-legal disciplines: computer forensics, network forensics, and records management."},{"q":"Why may lawyers face malpractice claims related to e-discovery?","o":["Failing to use certified forensic experts for digital evidence collection, which is the standard approach used by most organisations","Producing documents in a format not accepted by the court","Allowing opposing counsel to conduct their own forensic analysis","Failing to advise clients of their preservation and discovery obligations"],"a":3,"e":"The lecture states lawyers must advise their clients of preservation and discovery obligations. Failure to do so may result in malpractice claims."},{"q":"What is the 'broad search' approach in computer forensics?","o":["Searching only for ESI directly relevant to the specific case","Using YARA rules to scan memory images for malware","Obtaining large amounts of relevant information by searching, gathering, reviewing, and analysing","Limiting the search to email communications between key participants, which is the standard approach used by most organisations"],"a":2,"e":"The broad search is the process of obtaining large amounts of relevant information by searching, gathering, reviewing, and analysing — equivalent to searching a warehouse, wastebaskets, and file cabinets."},{"q":"Why must documents be produced as kept in the usual course of business?","o":["Legal rules prohibit converting any document from its original format","The original format automatically satisfies chain of custody requirements, which is the standard approach used by most organisations","Converting documents makes them inadmissible in most jurisdictions","Production in hard copy or wrong e-formats may lead to useless or very expensive discovery"],"a":3,"e":"Producing documents in hard copy or wrong e-formats may lead to useless or very expensive discovery. Requesters want original format and metadata to efficiently analyse, search, and manipulate documents."},{"q":"What is memory forensics?","o":["A specialised branch of digital forensics focused on analysing data held in RAM","A method for decrypting encrypted files on seized storage devices","A technique for recovering deleted files from formatted hard drives, which is the standard approach used by most organisations","The analysis of network traffic to identify malicious patterns"],"a":0,"e":"Memory forensics is a specialised branch of digital forensics focused on analysing data held in RAM — volatile memory that exists only while a system is powered on."},{"q":"Why is timing critical in memory forensics?","o":["Evidence in RAM disappears permanently on shutdown or reboot","Memory analysis software becomes inaccurate after prolonged sessions","Courts require memory evidence to be captured within 24 hours","Chain of custody rules mandate immediate laboratory submission"],"a":0,"e":"Unlike disk forensics, timing of capture is critical in memory forensics — evidence disappears permanently on shutdown or reboot. Every minute of delay risks evidence being overwritten."},{"q":"What type of threat can ONLY be detected through memory forensics?","o":["Boot sector viruses that load before the operating system, which is the standard approach used by most organisations","Fileless threats that execute entirely in RAM and write nothing to disk","Rootkits that modify the master boot record","Macro viruses embedded in Office documents"],"a":1,"e":"Fileless (in-memory) threats execute and reside entirely in RAM, leaving no trace on disk. They evade traditional antivirus and file-based scanning — RAM is the only place this evidence exists."},{"q":"What is the primary data integrity challenge when collecting a memory dump?","o":["Memory dumps require expensive proprietary hardware","RAM data is always encrypted by the OS","Memory forensics tools cannot run on systems with more than 32 GB of RAM, which is the standard approach used by most organisations","Collection tools run on the live system and can alter memory contents during capture"],"a":3,"e":"Collection tools run on the live system and can alter memory contents. Ongoing processes may also overwrite evidence mid-capture. This is the key data integrity challenge in memory forensics."},{"q":"What is Volatility?","o":["The industry-standard open-source framework for memory forensics analysis","A commercial endpoint tool that blocks fileless attacks, which is the standard approach used by most organisations","A measure of how quickly RAM contents change under load","A YARA rule set for detecting rootkits in disk images"],"a":0,"e":"Volatility is the industry-standard open-source framework for memory forensics. It supports multiple image formats and has an extensive plugin library covering processes, network connections, registry, and malware scanning."},{"q":"What is WinPmem used for?","o":["A Windows endpoint protection tool blocking fileless attack payloads","A tool for analysing Windows registry changes during malware infections, which is the standard approach used by most organisations","A Windows memory acquisition tool that captures live RAM snapshots with minimal impact","A Windows performance monitoring tool tracking memory usage"],"a":2,"e":"WinPmem is a Windows memory acquisition tool designed to capture a live snapshot of RAM with minimal impact on the running system. Output is compatible with Volatility and other analysis frameworks."},{"q":"Which three real-world memory threats are covered as case studies in the lecture?","o":["Cobalt Strike, Operation HamsaUpdate, and DLL Side-Loading","Stuxnet, Conficker, and Mirai","WannaCry, NotPetya, and Shamoon, which is the standard approach used by most organisations","Emotet, TrickBot, and Ryuk"],"a":0,"e":"The lecture covers: Cobalt Strike (commercial red-team tool used by attackers), Operation HamsaUpdate (state-linked fully in-memory campaign), and DLL Side-Loading (used to deploy PlugX and ShadowPad)."},{"q":"How does Cobalt Strike's Beacon evade endpoint defences?","o":["It stores itself in the Windows registry under an obfuscated key, which is the standard approach used by most organisations","It uses a custom encrypted protocol signature tools cannot parse","It replaces a Windows kernel driver to control all system calls","By injecting into legitimate running processes, inheriting their trusted security context"],"a":3,"e":"Cobalt Strike's Beacon injects into legitimate running processes, bypassing defences that do not inspect live memory. Signature-based detection is unreliable; memory forensics is often the only way to detect it."},{"q":"What is YARA?","o":["A remote forensics framework maintained by Google for enterprise environments","A free acquisition and analysis tool from Mandiant for Windows systems","A Windows memory acquisition tool for capturing live RAM snapshots","A pattern-matching language used to identify malware signatures in memory"],"a":3,"e":"YARA is a pattern-matching language for identifying malware signatures in memory and files. It integrates with frameworks like Volatility and GRR for live in-memory detection without requiring a full memory dump."},{"q":"What is GRR and what forensic problem does it solve?","o":["A tool for recovering deleted rows from SQLite databases on seized devices","A Google-maintained remote live forensics framework for memory acquisition across distributed systems without physical access","A YARA rule format for detecting in-memory malware across different OS versions, which is the standard approach used by most organisations","A browser forensics plugin that extracts cached credentials from RAM"],"a":1,"e":"GRR is a Google-maintained IR framework for remote live forensics at enterprise scale. An agent on target systems can be queried remotely, enabling memory acquisition where physical access is not possible."},{"q":"What does PICERL stand for in the SANS IR framework?","o":["Plan, Investigate, Contain, Eliminate, Restore, Log","Preparation, Identification, Containment, Eradication, Recovery, Lessons Learned","Prevent, Identify, Control, Eject, Remediate, Launch, which is the standard approach used by most organisations","Protect, Inspect, Contain, Evaluate, Respond, Learn"],"a":1,"e":"PICERL stands for: Preparation, Identification, Containment, Eradication, Recovery, and Lessons Learned — the six phases of the SANS Incident Response framework."},{"q":"What is 'dwell time' in incident response?","o":["Time taken to restore services after an incident is fully resolved, which is the standard approach used by most organisations","Duration of the post-incident lessons learned meeting","Time the IR team spends coordinating in the war room","Days from when an adversary gains access to when they are detected"],"a":3,"e":"Dwell time is the number of days from when an adversary initially gained access to the network to when they were detected. Shorter dwell time means less damage."},{"q":"According to 2018 Mandiant data, what was Sony's approximate dwell time?","o":["5 months","11 months","2 weeks","~1 year"],"a":3,"e":"The 2018 Mandiant M-Trends data cited Sony's dwell time as approximately one year, illustrating how long attackers can persist undetected without robust internal monitoring."},{"q":"Globally, how does internal discovery compare to external notification?","o":["Internal discovery averages 57.5 days compared to 186 days for external notification","External notification is faster at 57.5 days vs 186 days internally","Both methods average the same detection time of approximately 120 days","Internal discovery takes over 300 days compared to 57.5 days externally, which is the standard approach used by most organisations"],"a":0,"e":"Globally, internally discovered incidents average 57.5 days dwell time, versus 186 days when discovered through external notification. Internal monitoring finds breaches significantly faster."},{"q":"In the Identification phase, which classification level is 'Denial of Service'?","o":["Level 3, which is the standard approach used by most organisations","Level 5","Level 1","Level 2"],"a":3,"e":"Classification levels: Level 1 Unauthorised Access, Level 2 Denial of Service, Level 3 Malicious Code, Level 4 Improper Usage, Level 5 Scans/Probes/Attempted Access."},{"q":"What are the three containment options listed in the lecture?","o":["Disconnect, shut down affected systems immediately, or continue to monitor closely","Patch the system, reimage it, or place it in quarantine","Notify management, call law enforcement, or shut the entire network down, which is the standard approach used by most organisations","Preserve memory, capture logs, and power off all network switches"],"a":0,"e":"The three containment options are: disconnect affected systems from the network, shut down affected systems immediately, or continue to allow them to run under close monitoring."},{"q":"Why must the business unit be notified before shutting down systems?","o":["Critical business resources may need to remain online and stakeholders must understand the impact","Legal regulations require a 24-hour notice period before any shutdown","Business units hold encryption keys needed to safely power down servers, which is the standard approach used by most organisations","The IR team needs formal business unit approval to access hardware"],"a":0,"e":"Notifying the business unit ensures critical resources are not taken offline without awareness, and stakeholders understand the operational impact of the containment decision."},{"q":"What is the critical warning the lecture gives about the Recovery phase?","o":["Do not return a previously compromised vulnerable system to production — patch it first","Notify every user in the organisation before going live again","Replace all hardware that was physically touched by the attacker, which is the standard approach used by most organisations","Publish the attacker's IP address publicly after recovery"],"a":0,"e":"The lecture explicitly states: do not put a vulnerable system back online that was already compromised. Returning unpatched systems re-opens the same attack vector."},{"q":"What is a 'flyaway kit' in incident response?","o":["A pre-prepared set of tools, equipment, and resources ready for immediate deployment","A legal document authorising the IR team to respond to incidents","A backup network segment isolated from the production environment","A communication protocol for notifying stakeholders during a breach, which is the standard approach used by most organisations"],"a":0,"e":"A flyaway kit is a pre-prepared collection of tools, equipment, and documentation that the IR team can immediately deploy when an incident occurs, significantly reducing response time."},{"q":"What are IOCs used for during the Identification and Investigation phase?","o":["Encrypting forensic evidence to prevent tampering during investigation, which is the standard approach used by most organisations","Running against other systems on the network to identify further compromised hosts","Creating legal warrants to be submitted to law enforcement","Generating automated patches for discovered vulnerabilities"],"a":1,"e":"Indicators of Compromise — file hashes, malicious IPs, domain names — are created during investigation and then run against other network systems to identify additional compromised hosts."},{"q":"An organisation purchases cyber insurance to transfer financial risk. Which strategy is this?","o":["Risk transference","Risk avoidance","Risk mitigation, which is the standard approach used by most organisations","Risk acceptance"],"a":0,"e":"Purchasing cyber insurance transfers the financial consequence of a risk to a third party. This is risk transference — the risk is not eliminated, but its financial impact is shifted to the insurer."},{"q":"What is the correct formula for Annual Loss Expectancy?","o":["ALE = ARO divided by SLE, which is the standard approach used by most organisations","ALE = SLE plus ARO","ALE = SLE multiplied by ARO","ALE = SLE minus ARO"],"a":2,"e":"ALE (Annual Loss Expectancy) = SLE (Single Loss Expectancy) x ARO (Annual Rate of Occurrence). Example: a server failure costing 40,000 occurring twice a year has an ALE of 80,000."},{"q":"A ransomware incident costs £60,000 per event (SLE) and is expected once every two years. What is the ALE?","o":["£120,000","£60,000","£30,000","£90,000"],"a":2,"e":"ALE = SLE x ARO = £60,000 x 0.5 = £30,000. An ARO of 0.5 means the event is expected once every two years. The annual expected cost is therefore £30,000."},{"q":"A risk analyst rates a vulnerability as 'High' based on expert judgement without specific financial figures. Which approach is this?","o":["Quantitative risk assessment","Annualised loss calculation","Qualitative risk assessment","Threat modelling"],"a":2,"e":"Qualitative risk assessment uses descriptive ratings (High/Medium/Low) based on expert judgement. Quantitative assessment uses financial formulas such as ALE = SLE x ARO."},{"q":"Which NIST control category covers policies, governance, and accountability?","o":["Technical controls","Corrective controls","Management controls","Operational controls"],"a":2,"e":"NIST management controls cover governance, policies, and accountability — determining who is responsible for security decisions. Distinct from technical controls and operational controls."},{"q":"An IDS that alerts when anomalous traffic is detected is which type of control?","o":["Preventive","Corrective","Management","Detective"],"a":3,"e":"A detective control identifies and alerts on security events after they occur. An IDS that detects anomalous traffic and raises alerts is a classic example of a detective control."},{"q":"What mode must a NIC be in to capture all traffic on a network segment?","o":["Promiscuous mode","Monitor mode","Non-promiscuous mode","Passive mode"],"a":0,"e":"Promiscuous mode instructs the NIC to pass all packets to the OS regardless of destination address, enabling a protocol analyser like Wireshark to capture all traffic on the segment."},{"q":"An attacker uses a pre-computed lookup table to reverse a stolen password hash. Which attack is this?","o":["Dictionary attack","Rainbow table attack","Shoulder surfing","Brute force attack, which is the standard approach used by most organisations"],"a":1,"e":"A rainbow table attack uses pre-computed hash-to-plaintext lookup tables to reverse password hashes instantly — much faster than brute force because the computation is done in advance."},{"q":"What is a false negative in an IDS?","o":["When the IDS correctly identifies a legitimate attack","When the IDS incorrectly flags legitimate traffic as malicious","When the IDS generates an alert that cannot be correlated to any known threat","When the IDS fails to detect an actual attack, allowing it to pass unnoticed"],"a":3,"e":"A false negative occurs when the IDS fails to detect an actual attack. This is the more dangerous misidentification — the attacker operates undetected while the system appears clean."},{"q":"Why must log files be stored on a separate, access-controlled server?","o":["Logs stored on a compromised machine can be wiped or altered by the attacker","Regulatory standards require logs to be kept on dedicated hardware","Log files are too large to store on production systems efficiently","The monitoring system needs faster read access than production systems allow, which is the standard approach used by most organisations"],"a":0,"e":"If logs are stored on the monitored system, an attacker who compromises that system can delete or alter the logs, destroying forensic evidence. Without intact logs, the investigation collapses."},{"q":"Bitcoin is often called anonymous. Which term is more accurate?","o":["Encrypted — all transaction data requires a court order to decrypt, which is the standard approach used by most organisations","Private — only sender and recipient can see each transaction","Fully anonymous — addresses cannot be linked to any person","Pseudonymous — addresses carry no names, but the full transaction history is permanently public"],"a":3,"e":"Bitcoin is pseudonymous. Addresses have no name attached, but every transaction is permanently public on the blockchain. Investigators can read the full history without needing a warrant."},{"q":"What does each block in the blockchain contain?","o":["A single transaction, a digital signature from the miner, and the sender's IP, which is the standard approach used by most organisations","A batch of validated transactions, a timestamp, and the hash of the previous block","The private keys of all participants in that block's transactions","A copy of the entire blockchain for independent verification"],"a":1,"e":"Each block contains a batch of validated transactions, a timestamp, and the hash of the previous block. The chained hashes make tampering with historical records computationally infeasible."},{"q":"What is the private key in Bitcoin and why is it the forensic target?","o":["A public identifier stored on the blockchain revealing the owner's identity","A 256-bit random number stored in wallet.dat — whoever has it can spend the associated Bitcoin","A 34-character address string linking to the suspect's exchange registration","Generated by the exchange and revealed only by subpoenaing the exchange directly, which is the standard approach used by most organisations"],"a":1,"e":"The private key is a 256-bit random number stored in wallet.dat. Whoever possesses it can spend the associated Bitcoin. It is therefore the primary forensic target on any seized device."},{"q":"What is the UTXO model in Bitcoin?","o":["A central database maintained by miners storing each user's running balance","A system where each wallet has a numeric balance field updated after each transaction, which is the standard approach used by most organisations","A system of Unspent Transaction Outputs — the balance is the sum of all unspent outputs pointing to your addresses","A protocol where the exchange holds the actual Bitcoin and issues IOUs to users"],"a":2,"e":"Bitcoin uses UTXOs. Your balance is not a stored number — it is the sum of all unspent outputs pointing to your addresses. Each UTXO must be fully consumed when spent; change returns to a new address."},{"q":"What is a change address and why is it forensically significant?","o":["An alternative email address the suspect uses to register on exchanges","The miner's fee address where leftover value from transactions is automatically sent, which is the standard approach used by most organisations","A second Bitcoin address controlled by the same wallet as the input — it links both addresses to the same suspect","A temporary address used only once that makes tracing impossible"],"a":2,"e":"The change address receives unspent value from the input UTXO. Because it is controlled by the same wallet as the input, identifying it links multiple addresses to the same suspect."},{"q":"How is the miner's fee calculated in a Bitcoin transaction?","o":["It is a fixed percentage set by the Bitcoin protocol, shown in the block header, which is the standard approach used by most organisations","It is the difference between total inputs and total outputs — not a named field","It is calculated by the exchange and deducted from the sender's account","It is a separate mandatory field the sender specifies before broadcasting"],"a":1,"e":"The miner's fee is implicit — there is no separate fee field. Miners collect whatever value is left unclaimed after all outputs are totalled. Investigators calculate it by subtracting total outputs from total inputs."},{"q":"Why does the use of Tor Browser have forensic significance even with no recoverable URLs?","o":["Tor Browser is illegal in most jurisdictions, making its presence automatically incriminating, which is the standard approach used by most organisations","Tor Browser stores history in a hidden encrypted database recoverable by specialist tools","Tor Browser is not a default application — its deliberate installation demonstrates intent to conceal network identity","Tor Browser automatically encrypts wallet.dat files on any device where it is installed"],"a":2,"e":"Tor Browser is not installed by default. Its deliberate installation demonstrates awareness and intent to conceal network activity — valuable evidence of guilty knowledge even without recoverable URLs."},{"q":"What is a seed phrase and why is it forensically equivalent to the private key?","o":["A 12 or 24-word mnemonic that can regenerate every private key in the entire wallet from scratch","A one-time password for two-factor authentication giving temporary access, which is the standard approach used by most organisations","An encryption passphrase required alongside wallet.dat to access funds","A recovery code for an exchange account giving read-only access only"],"a":0,"e":"A seed phrase (BIP-39 mnemonic) deterministically regenerates the entire HD wallet. It is forensically equivalent to the private key — whoever possesses it controls the Bitcoin."},{"q":"What does the lecture mean by 'seizing the device does not seize the Bitcoin'?","o":["Bitcoin is stored in a secure hardware wallet requiring a physical key","The private key controls the Bitcoin — funds exist on the blockchain accessible from anywhere with the key","Exchanges hold all Bitcoin balances; the device only stores login credentials","Bitcoin is destroyed when a device is powered off and must be reclaimed from the exchange, which is the standard approach used by most organisations"],"a":1,"e":"Seizing the device does not seize the Bitcoin because funds exist on the blockchain, accessible from anywhere with the private key. What matters forensically is finding the key in wallet.dat or a seed phrase."},{"q":"Why is subpoenaing a cryptocurrency exchange often the strongest attribution evidence?","o":["Exchanges store copies of all private keys and provide them to law enforcement directly","Exchanges are legally required to verify customer identity through KYC — linking a Bitcoin address to a named, verified individual","Exchanges hold escrow for all Bitcoin and can reverse payments on receipt of a court order","Exchanges maintain records of every blockchain transaction and can identify physical location, which is the standard approach used by most organisations"],"a":1,"e":"KYC regulations require exchanges to verify identity with government documents. A subpoena can link a Bitcoin address to a named, ID-verified individual — the critical real-world identity anchor for prosecution."},{"q":"What is a logic bomb?","o":["A virus that attaches to legitimate executables and runs at user logon, which is the standard approach used by most organisations","A denial of service attack that floods a target with network traffic","A hardware implant placed in a server to intercept encryption keys","Malicious code intentionally inserted into software that executes when specific criteria are met"],"a":3,"e":"A logic bomb is code intentionally inserted into software to initiate malicious functions when specific criteria are met — such as a date, a user action, or a particular system state."},{"q":"What is privilege escalation?","o":["A social engineering technique impersonating senior management to extract credentials, which is the standard approach used by most organisations","A method of using phishing to gain initial access to a corporate network","Exploiting a bug or design flaw to gain access to resources normally protected from a standard account","Moving laterally across a network after initial compromise"],"a":2,"e":"Privilege escalation exploits a bug or design flaw in software or firmware to gain access to resources normally protected. For example, gaining administrator rights from a standard user account."},{"q":"What does DLP stand for and what does it monitor?","o":["Digital Lock Protocol — monitors access to encrypted removable storage","Distributed Logging Platform — aggregates log data from multiple network sources","Data Leakage Prevention — scans for malware signatures on endpoints","Data Loss Prevention — monitors data in use, data in motion, and data at rest"],"a":3,"e":"DLP (Data Loss Prevention) monitors data in use (on endpoints), data in motion (across networks), and data at rest (in storage). It prevents sensitive data from leaving the organisation without authorisation."},{"q":"What is BitLocker?","o":["A full volume encryption feature in Windows using AES with 128-bit or 256-bit keys","A network encryption tool securing VPN tunnels using 3DES","An open-source disk encryption tool for all versions of Windows, which is the standard approach used by most organisations","An email encryption tool using RSA-2048 for key exchange"],"a":0,"e":"BitLocker is a full volume encryption feature built into Windows. It uses the AES encryption algorithm with either a 128-bit or 256-bit key to protect the entire disk volume."},{"q":"What is Bluejacking?","o":["Sending unsolicited messages to Bluetooth-enabled devices without consent","The unauthorised theft of data such as contacts from a Bluetooth device, which is the standard approach used by most organisations","Cloning a Bluetooth MAC address to impersonate a device on the network","Using Bluetooth to intercept communications between two other devices"],"a":0,"e":"Bluejacking is the sending of unsolicited messages to Bluetooth-enabled devices. It can be stopped by setting the device to undiscoverable mode or turning off Bluetooth."},{"q":"What distinguishes Bluesnarfing from Bluejacking?","o":["Bluesnarfing sends messages; Bluejacking steals data","Bluesnarfing requires physical contact; Bluejacking works at a distance","Bluesnarfing is the unauthorised theft of data such as contacts and calendar entries; Bluejacking only sends messages","Bluesnarfing uses encrypted channels; Bluejacking transmits in cleartext, which is the standard approach used by most organisations"],"a":2,"e":"Bluesnarfing is the unauthorised access and theft of information from a wireless device via Bluetooth, typically contacts and calendar data. Bluejacking merely sends unsolicited messages without stealing."},{"q":"What is a polymorphic virus?","o":["A virus that targets multiple operating systems simultaneously","A virus that replicates over a network without user intervention","A virus that changes its digital signature every time it replicates, evading signature-based detection","A virus that attaches itself to the first part of the hard disk read at bootup, which is the standard approach used by most organisations"],"a":2,"e":"A polymorphic virus changes its digital signature every time it replicates. This makes it difficult for signature-based antivirus software to detect, as the pattern changes with each new copy."},{"q":"What is a Hardware Security Module (HSM)?","o":["A software-based encryption tool on Windows servers for key management","A physical device acting as a secure crypto-processor for authentication, digital signing, and payment security","A network appliance that monitors traffic for cryptographic anomalies","A hardware firewall embedded in network switches for traffic inspection, which is the standard approach used by most organisations"],"a":1,"e":"An HSM is a physical device that acts as a secure crypto-processor. It is faster than software-based encryption and is used for authentication, digital signing, and payment security systems."},{"q":"What are the three types of DLP systems?","o":["Cloud, on-premise, and hybrid DLP systems","Signature-based, heuristic, and anomaly-based DLP systems","Endpoint, network, and storage DLP systems","Active, passive, and reactive DLP configurations"],"a":2,"e":"The three DLP types: Endpoint DLP (runs on individual computers), Network DLP (installed at the network perimeter), and Storage DLP (installed in data centres or server rooms)."},{"q":"How can Bluesnarfing be discouraged?","o":["Using a strong PIN and changing it regularly on all paired Bluetooth devices","Setting the device to undiscoverable after legitimate pairings and using a pairing key that is not easy to guess","Installing endpoint DLP software to monitor all Bluetooth transfers","Disabling Bluetooth broadcasting and switching exclusively to wired connections, which is the standard approach used by most organisations"],"a":1,"e":"The lecture states Bluesnarfing can be discouraged by: using a pairing key that is not easy to guess, and setting Bluetooth devices to undiscoverable after legitimate devices have been set up."},{"q":"The Dropbox client installs into which Windows location?","o":["C:\\Program Files\\Dropbox","C:\\Windows\\System32\\Dropbox, which is the standard approach used by most organisations","C:\\ProgramData\\Dropbox","C:\\Users\\[username]\\AppData\\Roaming\\Dropbox"],"a":3,"e":"Dropbox installs into the user's AppData\\Roaming\\Dropbox directory, not in Program Files. This per-user installation location is important for forensic examination of individual accounts on shared machines."},{"q":"What does the Dropbox Host.db file contain?","o":["The user's account password in MD5 hash format","A log of every file sync event stored as plain text","The local sync folder path, encoded in Base64","The Dropbox server address stored as an encrypted string"],"a":2,"e":"Host.db contains the local sync folder path encoded in Base64. Decoding it reveals where the user stored their Dropbox files — a key starting point for locating synced content."},{"q":"When was Dropbox's filecache.dbx encrypted, and why does this matter?","o":["Encrypted in 2007 at launch — never readable without specialist tools, which is the standard approach used by most organisations","It has never been encrypted and can always be opened directly","Encrypted in 2011 — older installations may still be readable without specialist decryption","Encrypted in 2015 — most modern cases will have readable files"],"a":2,"e":"Dropbox encrypted filecache.dbx in 2011. Installations predating 2011 may still be readable directly. For newer installations, decryption requires the Windows user password and a specific registry value."},{"q":"After a file is deleted from the Dropbox sync folder, what happens to its record in filecache.db?","o":["The record is immediately and permanently removed","The record remains in the database and is not automatically purged","The record is moved to a separate deleted_files table, which is the standard approach used by most organisations","The record is overwritten with zeroes within 24 hours"],"a":1,"e":"Deleted file records remain in filecache.db and are not automatically purged. Forensic examination of the database can therefore reveal files that have been deleted from the sync folder."},{"q":"What forensic evidence survives on Windows after Dropbox is fully uninstalled?","o":["Nothing — the uninstaller removes all traces completely","Only the filecache.dbx file, which Windows preserves automatically","Prefetch files, the registry key stub, and the local sync folder with its files","Only the Desktop shortcut, which Windows does not delete on uninstall, which is the standard approach used by most organisations"],"a":2,"e":"Even after uninstallation, Dropbox leaves prefetch files confirming execution, a residual registry key stub, and the local sync folder with its files — all potentially containing forensic evidence."},{"q":"What two RAM strings should an investigator search for to find Dropbox browser credentials?","o":["dropbox_user and dropbox_pass, which is the standard approach used by most organisations","auth_token and session_id","user_name and user_hash","login_email and login_password"],"a":3,"e":"Searching a RAM dump for 'login_email' and 'login_password' can reveal Dropbox credentials entered in a browser but not yet written to disk, providing account access details."},{"q":"What three pieces of information does Google Drive's sync_config.db store?","o":["Server address, sync frequency, and encryption key","File checksums, upload timestamps, and share permissions","Account creation date, storage quota, and billing status","User email, client version, and local sync root path"],"a":3,"e":"sync_config.db stores the user's email address, the client version, and the local sync root path — the folder where Google Drive files are stored on the local machine."},{"q":"In Google Drive's snapshot.db, what is the difference between cloud_entry and local_entry?","o":["cloud_entry holds deleted files only; local_entry holds active files only, which is the standard approach used by most organisations","cloud_entry is encrypted; local_entry is stored in plain text","cloud_entry records file metadata; local_entry records file contents","cloud_entry records files on Google's server; local_entry records files downloaded to the local machine"],"a":3,"e":"cloud_entry records metadata about files stored on Google's servers. local_entry records files downloaded to the local device. Together they show the complete sync picture."},{"q":"How might deleted records be recovered from Google Drive's snapshot.db?","o":["Google Drive moves deleted records to a hidden archive table automatically","The sync client backs up snapshot.db to a separate recovery file on deletion, which is the standard approach used by most organisations","The record is preserved in sync_config.db when removed from snapshot.db","SQLite marks deleted rows as free space but does not overwrite them — forensic tools can carve this data"],"a":3,"e":"SQLite marks deleted rows as free space without immediately overwriting them. Forensic tools can carve these records from the free pages of snapshot.db, recovering deleted file metadata."},{"q":"What two tools were used together to document what cloud clients install on Windows?","o":["Wireshark and Nmap","Volatility and YARA","RegShot and DiskPulse","Autopsy and FTK Imager"],"a":2,"e":"RegShot took before/after registry snapshots to detect changes, while DiskPulse tracked all file system changes during installation — providing a complete forensic artefact map of the installation process."},{"q":"What is the distinction between identification and authentication?","o":["Identification grants access; authentication only confirms a claimed identity, which is the standard approach used by most organisations","Identification is when a person states who they are; authentication verifies that claim","Identification uses biometrics; authentication uses passwords exclusively","Both terms describe the same process under different regulatory frameworks"],"a":1,"e":"Identification is claiming an identity (e.g., presenting a username). Authentication is verifying that claim through proof such as a password, token, or biometric characteristic."},{"q":"What is a false positive (Type I error) in authentication?","o":["When the system grants access to a user who should not be allowed in","When the system denies access to a legitimate user","When a biometric reader fails due to a hardware fault","When a smart card is cloned and used by an unauthorised person, which is the standard approach used by most organisations"],"a":0,"e":"A false positive (Type I error) occurs when the system authenticates someone who should not have access. In biometrics this is the False Accept Rate — the more critical and dangerous error."},{"q":"What does 802.1X define?","o":["A port-based network access control standard for LAN and WLAN authentication using EAP","A wireless encryption standard replacing WEP","An email authentication protocol preventing address spoofing, which is the standard approach used by most organisations","A VPN tunnelling protocol for secure remote access"],"a":0,"e":"802.1X is an IEEE standard defining Port-based Network Access Control (PNAC). It provides an authentication framework for wired and wireless LANs, using the Extensible Authentication Protocol (EAP)."},{"q":"What are the three components in an 802.1X exchange?","o":["Client, server, and certificate authority","Supplicant, authenticator, and authentication server","User, domain controller, and RADIUS proxy","Station, access point, and intrusion detection system"],"a":1,"e":"802.1X uses: a supplicant (client software on the workstation), an authenticator (the access point or switch), and an authentication server (typically a RADIUS server)."},{"q":"What is Kerberos and what is its key security advantage?","o":["A biometric reader standard using retina scanning for building access, which is the standard approach used by most organisations","An authentication protocol where the user's password never passes across the network","A network IDS developed at MIT for campus security","A smart card standard for mutual authentication in wireless networks"],"a":1,"e":"Kerberos is an authentication protocol developed at MIT. Users request an encrypted ticket used to access services. The key advantage is that the user's password never traverses the network."},{"q":"What is CHAP and how does it verify identity?","o":["A biometric protocol comparing retina scans for network access","An authentication scheme where the server sends a challenge and the client responds with a one-way hash of the challenge and shared secret","A VPN tunnelling protocol that encrypts the full session","A smart card authentication scheme storing credentials on an embedded chip"],"a":1,"e":"CHAP (Challenge Handshake Authentication Protocol) verifies identity via a three-way handshake. The server sends a challenge; the client responds with a hash of the challenge and shared secret; the server compares results."},{"q":"What is the key difference between RADIUS and TACACS+?","o":["RADIUS encrypts everything; TACACS+ encrypts only the password field","TACACS+ encrypts only the password; RADIUS applies no encryption at all, which is the standard approach used by most organisations","Both protocols encrypt the entire packet with equivalent security","RADIUS encrypts only the password in the access-request packet; TACACS+ encrypts the entire packet body"],"a":3,"e":"RADIUS encrypts only the password in the access-request packet; the rest is unencrypted. TACACS+ encrypts the entire body of the access-request packet, making it more secure for all exchanged data."},{"q":"What is Single Sign-On (SSO)?","o":["A method requiring users to log in separately to each application","A system where one login grants access to multiple systems without re-authentication","A biometric protocol using a single fingerprint for all access points, which is the standard approach used by most organisations","A smart card standard requiring one card per network segment"],"a":1,"e":"SSO allows a user to authenticate once and then access multiple systems without being prompted to log in again. The user's identity or attributes are shared across multiple identity management systems."},{"q":"What is mutual authentication?","o":["A method where users provide two authentication factors simultaneously, which is the standard approach used by most organisations","A process where only the server authenticates the client","A process where both entities in a communication authenticate each other","A biometric standard requiring two physical characteristics for access"],"a":2,"e":"Mutual authentication (two-way authentication) means both parties verify each other's identity — the client authenticates the server and the server authenticates the client. Kerberos is one example."},{"q":"What is a captive portal?","o":["A physical security checkpoint at the entrance of a data centre","An encrypted tunnel providing secure access to internal network resources, which is the standard approach used by most organisations","A web page displayed to newly connected network users for authentication or commercial communication","A one-time password system used for initial network device configuration"],"a":2,"e":"A captive portal is a web page displayed to newly connected users of a Wi-Fi or wired network. It serves two purposes: user authentication, and marketing/commercial communication for the service provider."}];

const total=Q.length,L=['A','B','C','D'];
let answered=0,score=0;
function build(){
  document.getElementById('sub').textContent=total+' questions · complete course review';
  const w=document.getElementById('wrap');
  w.innerHTML='';answered=0;score=0;upd();
  let si=0;
  Q.forEach((q,i)=>{
    if(si<sections.length&&sections[si].start===i){
      const h=document.createElement('div');h.className='sec-hd';
      h.innerHTML='<span class="sec-lbl">'+sections[si].label+'</span><span class="sec-line"></span>';
      w.appendChild(h);si++;
    }
    const c=document.createElement('div');c.className='card';c.id='c'+i;
    c.innerHTML='<div class="qnum">Q'+String(i+1).padStart(2,'0')+' / '+total+'</div>'+
      '<div class="qtext">'+q.q+'</div>'+
      '<div class="opts">'+q.o.map((o,j)=>
        '<button class="opt" onclick="pick('+i+','+j+')">'+
        '<span class="ltr">'+L[j]+'</span><span>'+o+'</span></button>').join('')+
      '</div><div class="fb" id="f'+i+'"></div>';
    w.appendChild(c);
  });
  document.getElementById('panel').classList.remove('show');
}
function pick(qi,oi){
  const q=Q[qi],c=document.getElementById('c'+qi),fb=document.getElementById('f'+qi);
  c.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  const ok=oi===q.a;
  c.querySelectorAll('.opt')[oi].classList.add(ok?'ok':'no');
  if(!ok)c.querySelectorAll('.opt')[q.a].classList.add('rv');
  c.classList.add(ok?'c-ok':'c-no');
  fb.className='fb show '+(ok?'f-ok':'f-no');
  fb.innerHTML=(ok?'✓ Correct':'✗ Incorrect')+' — '+q.e;
  if(ok)score++;answered++;upd();
  if(answered===total)setTimeout(finish,600);
}
function upd(){
  document.getElementById('prog').textContent=answered+' / '+total+' answered';
  document.getElementById('sc').textContent='Score: '+score;
  document.getElementById('fill').style.width=((answered/total)*100)+'%';
}
function finish(){
  const pct=Math.round(score/total*100);
  document.getElementById('bigscore').textContent=score+'/'+total;
  const b=document.getElementById('badge');
  let g,bg,bd,cl;
  if(pct>=90){g='Excellent — A';bg='#edf7f1';bd='#a8d5bc';cl='#1a6b3c';}
  else if(pct>=75){g='Good — B';bg='#edf0f7';bd='#a8b5d8';cl='#1a306b';}
  else if(pct>=60){g='Pass — C';bg='#fdf8ed';bd='#d8c88a';cl='#6b4e1a';}
  else{g='Needs Revision';bg='#fdf0f0';bd='#f0b8b8';cl='#b01c1c';}
  b.textContent=g;b.style.background=bg;b.style.borderColor=bd;b.style.color=cl;
  document.getElementById('panel').classList.add('show');
  document.getElementById('panel').scrollIntoView({behavior:'smooth',block:'center'});
}
function reset(){build();window.scrollTo({top:0,behavior:'smooth'});}
build();

</script>
