    border-color: var(--correct);
    background: rgba(0,255,135,0.06);
    color: var(--correct);

    border-color: var(--wrong);
    background: rgba(255,77,109,0.06);
    color: var(--wrong);

    border-color: rgba(0,255,135,0.4);
    background: rgba(0,255,135,0.03);
    color: var(--correct);

    padding: 0.8rem 1rem;
    border-radius: 5px;
    font-family: var(--mono);
    font-size: 0.8rem;
    line-height: 1.6;

    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 2rem;
    text-align: center;
    display: none;

    font-family: var(--mono);
    color: var(--accent);

    border-radius: 4px;
    font-family: var(--mono);
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    margin-bottom: 1.5rem;

    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 0.85rem;

    color: var(--muted);

  },

  },

    options: [

      "The investigator can read the addresses from the unencrypted key pool and correlate them with the blockchain. For key recovery, they would submit the file to Hashcat or John the Ripper for passphrase cracking.",

  },
  {
    q: "Bitcoin does not work like a bank account with a balance. Which model best describes how Bitcoin tracks ownership?",

  },

    answer: 2,
    explanation: "When you cannot spend just part of a UTXO, the system takes the full amount and creates new outputs — one for the recipient and one returning the change to an address you control. That change address belongs to the same wallet as the input. Finding it in a suspect's wallet file proves both addresses are controlled by the same person."
  },

    explanation: "The miner's fee is not a named field — it is what goes unclaimed. Total inputs minus total outputs equals the fee, which the miner who includes the transaction in a block collects. This means an investigator reading a transaction can calculate the fee themselves: inputs − outputs = fee paid."
  },

      "It is encrypted and sent to the mining pool that wins the next block, which then broadcasts the confirmed transaction to the network.",
      "The sender uploads the transaction to a public API endpoint, from which all wallets poll at regular intervals to stay synchronised."
    ],
    answer: 1,
    explanation: "Bitcoin uses a gossip protocol: the sender broadcasts to roughly 8 directly connected peers called entry nodes. Each of those relays to their peers, and within seconds every node worldwide holds a copy. There is no central server. This is why Bitcoin is censorship-resistant — and why IP attribution analysis has to work probabilistically rather than definitively."
  },
  {
    q: "Why does the fact that Bitcoin uses unencrypted TCP connections create a forensic opportunity for investigators?",
    options: [
      "Unencrypted TCP allows investigators to read the private keys of all transaction participants as the data passes through routers.",
      "Because TCP is unencrypted, network traffic can be observed. The first node to broadcast a transaction is very likely the originator, allowing probabilistic IP attribution — linking a transaction to the IP address that first sent it.",
      "Unencrypted TCP means all Bitcoin transactions are stored in plain text on ISP servers, which can be subpoenaed directly.",
      "TCP connections require both parties to register with ICANN before communicating, creating a name-to-IP record that investigators can access."
    ],
    answer: 1,
    explanation: "Because Bitcoin's P2P layer uses unencrypted TCP, observers on the network can see which node first broadcasts a transaction. Statistical analysis of which node broadcast earliest — combined with timing data — allows researchers and law enforcement to probabilistically identify the originating IP address. This is a real technique used in prosecutions."
  },
  {
    q: "A suspect uses Tor Browser when accessing Bitcoin-related websites. Why is the presence of Tor Browser in the browser history forensically significant — even when no specific URLs are recoverable?",
    options: [

      "Tor Browser stores all browsing history in a hidden encrypted database that investigators can recover with specialist tools.",
      "Tor Browser is not installed by default on any operating system — its presence shows the suspect deliberately installed a tool designed to hide their network identity. Even without URLs, this is evidence of awareness and intent to conceal activity.",
      "Tor Browser automatically encrypts wallet.dat files on any device where it is installed, explaining the wallet encryption found on the seized device."
    ],
    answer: 2,
    explanation: "Tor Browser requires deliberate installation. Finding it on a seized device — especially when correlated with the dates of Bitcoin transactions — suggests the suspect understood that Bitcoin network activity could be traced to an IP address and took steps to prevent it. This is relevant to both intent and technical sophistication, even when no specific URLs survive in history."
  },
  {
    q: "What are the three converging lines of evidence an investigator uses to attribute a Bitcoin address to a real person?",
    options: [
      "Private key recovery, email interception, and physical surveillance of the suspect.",
      "On-chain tracing (following funds through the blockchain), device forensics (recovering wallet.dat and browser history), and third-party records (subpoenaing exchanges for KYC-verified account data).",
      "Blockchain analysis, CCTV footage from Bitcoin ATMs, and social media profiling.",

    answer: 1,

  },
  {

function buildQuiz() {

  container.innerHTML = '';
  answered = 0;
  score = 0;
  updateProgress();

  questions.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = `card-${i}`;

    const letters = ['A', 'B', 'C', 'D'];

    card.innerHTML = `
      <div class="q-number">Question ${String(i+1).padStart(2,'0')} / 20</div>
      <div class="q-text">${q.q}</div>
      <div class="options">
        ${q.options.map((opt, j) => `
          <button class="option" data-q="${i}" data-opt="${j}" onclick="selectAnswer(${i},${j})">
            <span class="option-letter">${letters[j]}</span>
            <span>${opt}</span>
          </button>
        `).join('')}
      </div>
      <div class="feedback" id="fb-${i}"></div>
    `;
    container.appendChild(card);
  });

  document.getElementById('score-panel').classList.remove('show');
}

function selectAnswer(qIndex, optIndex) {
  const q = questions[qIndex];
  const card = document.getElementById(`card-${qIndex}`);
  const buttons = card.querySelectorAll('.option');
  const fb = document.getElementById(`fb-${qIndex}`);

  buttons.forEach(b => b.disabled = true);

  const isCorrect = optIndex === q.answer;

  buttons[optIndex].classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) {
    buttons[q.answer].classList.add('reveal-correct');
  }

  card.classList.add('answered', isCorrect ? 'correct-card' : 'wrong-card');

  fb.className = `feedback show ${isCorrect ? 'correct-fb' : 'wrong-fb'}`;
  fb.innerHTML = `${isCorrect ? '✓ Correct' : '✗ Incorrect'} — ${q.explanation}`;

  if (isCorrect) score++;
  answered++;
  updateProgress();

  if (answered === questions.length) {
    setTimeout(showScore, 600);
  }
}

function updateProgress() {
  document.getElementById('prog-label').textContent = `${answered} / 20 answered`;
  document.getElementById('score-label').textContent = `Score: ${score}`;
  document.getElementById('progress-fill').style.width = `${(answered / 20) * 100}%`;
}

function showScore() {
  const panel = document.getElementById('score-panel');
  const pct = Math.round((score / 20) * 100);
  document.getElementById('final-score').textContent = `${score}/20`;

  const badge = document.getElementById('grade-badge');
  let grade, color;
  if (pct >= 90)      { grade = 'Excellent — A'; color = '#00ff87'; }
  else if (pct >= 75) { grade = 'Good — B';       color = '#00e5ff'; }
  else if (pct >= 60) { grade = 'Pass — C';        color = '#ffd700'; }
  else                { grade = 'Needs Revision — F'; color = '#ff4d6d'; }

  badge.textContent = grade;
  badge.style.background = color + '15';
  badge.style.border = `1px solid ${color}`;
  badge.style.color = color;

  panel.classList.add('show');
  panel.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function resetQuiz() {
  buildQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
