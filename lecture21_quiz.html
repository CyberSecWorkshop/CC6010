<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CC6010 – E-Discovery: From Beginning to Trial Quiz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap');

  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --card: #161f30;
    --border: #1e2d45;
    --accent: #00e5ff;
    --accent2: #ff4d6d;
    --correct: #00ff87;
    --wrong: #ff4d6d;
    --text: #e2eaf4;
    --muted: #6b7fa3;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
    background-image:
      radial-gradient(ellipse 80% 40% at 50% -10%, rgba(0,229,255,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 50% 30% at 90% 80%, rgba(255,77,109,0.05) 0%, transparent 60%);
  }

  header {
    text-align: center;
    max-width: 760px;
    margin: 0 auto 3rem;
  }

  .tag {
    display: inline-block;
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    color: var(--accent);
    border: 1px solid rgba(0,229,255,0.3);
    padding: 4px 12px;
    border-radius: 2px;
    margin-bottom: 1rem;
    text-transform: uppercase;
  }

  h1 {
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 0.5rem;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    color: var(--muted);
    font-size: 0.95rem;
    font-family: var(--mono);
  }

  .quiz-container {
    max-width: 760px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.5rem;
    transition: border-color 0.3s;
    position: relative;
    overflow: hidden;
  }

  .question-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--accent);
    opacity: 0.4;
  }

  .question-card.answered::before { opacity: 1; }
  .question-card.correct-card::before { background: var(--correct); }
  .question-card.wrong-card::before { background: var(--wrong); }

  .q-number {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--accent);
    letter-spacing: 0.1em;
    margin-bottom: 0.6rem;
    text-transform: uppercase;
  }

  .q-text {
    font-size: 1rem;
    font-weight: 600;
    line-height: 1.5;
    margin-bottom: 1.2rem;
    color: #cdd9ee;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    padding: 0.75rem 1rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    font-family: var(--sans);
    font-size: 0.9rem;
    color: var(--text);
    text-align: left;
    line-height: 1.4;
    width: 100%;
  }

  .option:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(0,229,255,0.04);
  }

  .option-letter {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--muted);
    min-width: 1.2rem;
    padding-top: 1px;
    flex-shrink: 0;
  }

  .option.correct {
    border-color: var(--correct);
    background: rgba(0,255,135,0.06);
    color: var(--correct);
  }

  .option.correct .option-letter { color: var(--correct); }

  .option.wrong {
    border-color: var(--wrong);
    background: rgba(255,77,109,0.06);
    color: var(--wrong);
  }

  .option.wrong .option-letter { color: var(--wrong); }

  .option.reveal-correct {
    border-color: rgba(0,255,135,0.4);
    background: rgba(0,255,135,0.03);
    color: var(--correct);
  }

  .option:disabled { cursor: default; }

  .feedback {
    margin-top: 1rem;
    padding: 0.8rem 1rem;
    border-radius: 5px;
    font-family: var(--mono);
    font-size: 0.8rem;
    line-height: 1.6;
    display: none;
    border-left: 3px solid;
  }

  .feedback.show { display: block; }
  .feedback.correct-fb { border-color: var(--correct); background: rgba(0,255,135,0.05); color: #a0ffd4; }
  .feedback.wrong-fb { border-color: var(--wrong); background: rgba(255,77,109,0.05); color: #ffa0b2; }

  .score-panel {
    max-width: 760px;
    margin: 2rem auto 0;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 2rem;
    text-align: center;
    display: none;
  }

  .score-panel.show { display: block; }

  .score-big {
    font-size: 4rem;
    font-weight: 800;
    font-family: var(--mono);
    color: var(--accent);
    line-height: 1;
    margin-bottom: 0.5rem;
  }

  .score-label {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 1.5rem;
  }

  .grade-badge {
    display: inline-block;
    padding: 6px 20px;
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    margin-bottom: 1.5rem;
  }

  .reset-btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 0.85rem;
    padding: 10px 28px;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .reset-btn:hover { background: rgba(0,229,255,0.1); }

  .progress-bar {
    max-width: 760px;
    margin: 0 auto 2rem;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #00b4d8);
    transition: width 0.4s ease;
    width: 0%;
  }

  .progress-text {
    max-width: 760px;
    margin: 0 auto 0.5rem;
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
  }
</style>
</head>
<body>

<header>
  <div class="tag">CC6010 · Digital Investigation &amp; E-Discovery</div>
  <h1>E-Discovery: From<br>Beginning to <span>Trial</span></h1>
  <p class="subtitle">20-question multiple choice quiz — Lecture 21</p>
</header>

<div class="progress-text">
  <span id="prog-label">0 / 20 answered</span>
  <span id="score-label">Score: 0</span>
</div>
<div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>

<div class="quiz-container" id="quiz"></div>

<div class="score-panel" id="score-panel">
  <div class="score-big" id="final-score">0/20</div>
  <div class="score-label">Final Score</div>
  <div class="grade-badge" id="grade-badge"></div>
  <br>
  <button class="reset-btn" onclick="resetQuiz()">↺ Retake Quiz</button>
</div>

<script>
const questions = [
  {
    q: "What is Early Case Evaluation (ECE)?",
    options: [
      "A court-ordered review of digital evidence after formal proceedings begin",
      "A preliminary fact-finding phase conducted before formal litigation begins",
      "A method used by judges to calculate damages prior to a civil trial",
      "An internal IT audit required annually under Sarbanes-Oxley"
    ],
    answer: 1,
    explanation: "Early Case Evaluation (ECE) is a preliminary fact-finding phase that establishes the factual basis of a lawsuit before formal litigation begins. In civil cases this involves interviewing the client and evaluating preliminary evidence; in criminal cases covert actions such as wiretaps may occur."
  },
  {
    q: "During criminal prelitigation investigations, which of the following covert actions may lawfully occur?",
    options: [
      "Wiretaps, body wires, and physical surveillance",
      "Serving legal hold letters and preservation notices on suspects",
      "Filing a Request for Admission directly with the criminal court",
      "Conducting a Meet and Confer session under FRCP 26(f)"
    ],
    answer: 0,
    explanation: "Criminal prelitigation differs significantly from civil cases. Covert actions — including wiretaps, body wires, and physical surveillance — may lawfully occur at this stage. These tools are unavailable in typical civil prelitigation, which relies instead on interviews and document review."
  },
  {
    q: "Which analytic tools are specifically identified in the lecture for link analysis and tree maps during the prelitigation phase?",
    options: [
      "FTK Imager and Relativity",
      "TrialDirector and LexisNexis CaseMap",
      "LAW and IPRO eScan-IT",
      "Analyst's Notebook and Social Network Analyzer"
    ],
    answer: 3,
    explanation: "Analyst's Notebook and Social Network Analyzer are the tools named in the lecture for conducting link analysis and generating tree maps during prelitigation. They help investigators map relationships between people, organisations, and events before formal proceedings begin."
  },
  {
    q: "What is a Legal Hold (also called a Litigation Hold or Preservation Letter)?",
    options: [
      "A court order freezing a defendant's financial assets pending judgment",
      "A search warrant issued by a judge authorising seizure of digital devices",
      "An order to preserve data in anticipation of litigation, audit, or government investigation",
      "A written request asking the opposing party to admit or deny specific facts"
    ],
    answer: 2,
    explanation: "A legal hold prohibits the destruction or processing of records in anticipation of litigation, audit, or a government investigation. It is mainly used in civil cases — criminal investigations rely on search warrants instead. Failure to comply can lead to spoliation sanctions."
  },
  {
    q: "Under which legislation can the destruction of evidence subject to a legal hold result in criminal prosecution?",
    options: [
      "Sarbanes-Oxley",
      "The Jencks Act",
      "FRCP Rule 26(b)(2)",
      "The Stored Communications Act"
    ],
    answer: 0,
    explanation: "Sarbanes-Oxley criminalises the destruction, alteration, or falsification of records related to a federal investigation or bankruptcy proceeding. The lecture identifies it as the statute under which evidence destruction can lead to criminal prosecution after a legal hold has been issued."
  },
  {
    q: "What does the Brady doctrine require of prosecutors in a criminal case?",
    options: [
      "To issue a legal hold before filing any formal charges against a defendant",
      "To preserve and disclose evidence that may be favourable to the defence",
      "To obtain a search warrant before accessing records held by cloud providers",
      "To file a Motion to Quash if evidence was obtained without probable cause"
    ],
    answer: 1,
    explanation: "The Brady doctrine requires the prosecution to disclose — and therefore preserve — evidence that is material to the guilt or punishment of a defendant, including exculpatory evidence. The lecture groups it with the Jencks Act and Giglio as obligations on the prosecution side to preserve evidence."
  },
  {
    q: "Which of the following must be included in a legal hold letter, according to the lecture?",
    options: [
      "The presiding judge's signature and the assigned case docket number",
      "A complete forensic image of all devices belonging to named custodians",
      "Named key custodians who are responsible for the relevant data",
      "A list of the opposing party's anticipated witnesses and experts"
    ],
    answer: 2,
    explanation: "The lecture identifies five required elements of a legal hold letter: locations where data may reside, data types, key custodians responsible for the data, a list of prohibited actions (no defragmenting, upgrading, moving, deleting, or overwriting), and a designated contact person. Naming key custodians is one of those five."
  },
  {
    q: "What is the primary purpose of a Request for Admission (RFA)?",
    options: [
      "To compel a witness to appear at a deposition or court proceeding",
      "To request the production of specific documents and digital evidence",
      "To establish an unbroken chain of custody for digitally collected evidence",
      "To ask a party to admit or deny specific facts, narrowing what remains in dispute"
    ],
    answer: 3,
    explanation: "An RFA is a written statement asking the opposing party to admit or deny certain facts so that undisputed matters can be removed from controversy, focusing further discovery on what is actually contested. It usually follows the legal hold letter and helps narrow the scope of investigation early."
  },
  {
    q: "What may happen if a party fails to respond to a Request for Admission within the required timeframe?",
    options: [
      "Some courts may treat the non-response as an admission of the stated facts",
      "The requesting party must immediately convert the RFA into an interrogatory",
      "The case is automatically dismissed for lack of participation in discovery",
      "A subpoena duces tecum is automatically issued by the clerk of court"
    ],
    answer: 0,
    explanation: "The lecture states that failure to respond to an RFA may be treated as an admission by some courts. This makes timely response critical — silence on an RFA is not neutral; it can result in unfavourable facts being deemed established without further argument."
  },
  {
    q: "What is the criminal law equivalent of interrogatories in civil proceedings?",
    options: [
      "A Motion to Quash challenging the validity of a subpoena",
      "A Bill of Particulars filed under FRCrP Rule 16",
      "A Request for Production addressed to the opposing counsel",
      "A subpoena duces tecum commanding production of specific items"
    ],
    answer: 1,
    explanation: "The lecture directly identifies the Bill of Particulars — filed under the Federal Rules of Criminal Procedure Rule 16 — as the criminal counterpart to interrogatories in civil cases. Both tools are designed to establish facts and narrow disputes before the matter proceeds to trial."
  },
  {
    q: "What does the Meet and Confer process, governed by FRCP 26(f) in civil cases, establish between the parties?",
    options: [
      "The trial judge's preferred format and order for presenting exhibits",
      "Chain of custody requirements for all physical evidence collected",
      "Agreed forms of ESI production, cost sharing, and search procedures such as keywords, custodians, and date ranges",
      "The admissibility standards for expert witness testimony at trial"
    ],
    answer: 2,
    explanation: "The Meet and Confer requires parties to convene before court deadlines and agree on how e-discovery will be managed — including the formats in which ESI will be produced, who pays, and what search procedures (keywords, custodians, date ranges) will be used. Failure to participate in good faith can result in court sanctions."
  },
  {
    q: "What is a Request for Production (RFP) in civil litigation?",
    options: [
      "A criminal court order compelling a defendant to surrender digital storage devices",
      "A written set of questions served to the opposing party requiring sworn answers",
      "An early case evaluation checklist used to identify and locate key custodians",
      "The primary civil discovery mechanism for requesting data, documents, videos, bank records, and other materials"
    ],
    answer: 3,
    explanation: "The RFP is the main tool for obtaining discovery in civil cases. It can request any information in a party's possession or control that is related to the litigation — including data, documents, videos, bank records, access to premises, and expert work product. Its criminal counterpart is a Motion for Discovery."
  },
  {
    q: "What does the proportionality principle under FRCP 26(b)(2) limit in the context of discovery?",
    options: [
      "The scope of discovery relative to its likely benefit to the case",
      "The total number of interrogatories that can be served in a single civil case",
      "The maximum time parties are allowed to spend in a Meet and Confer session",
      "The number of custodians that must be individually named in a legal hold letter"
    ],
    answer: 0,
    explanation: "FRCP 26(b)(2) proportionality limits the discovery burden — the time, cost, and effort required — relative to the likely benefit of the evidence sought. Courts are increasingly challenging 'document dumps' of largely irrelevant data produced under the guise of compliance with an RFP."
  },
  {
    q: "What is a subpoena duces tecum?",
    options: [
      "A court order requiring demonstrated probable cause before evidence can be seized",
      "A command requiring a person or organisation to produce specific items or permit their inspection",
      "A written request asking a party to formally admit or deny particular factual claims",
      "A motion filed with the court to challenge the legality of a previously issued search warrant"
    ],
    answer: 1,
    explanation: "A subpoena duces tecum goes beyond commanding a person to appear — it also compels them to produce specific items or permit inspection of particular materials. Like a standard subpoena, it can be challenged by filing a Motion to Quash with the relevant court."
  },
  {
    q: "Under the Stored Communications Act (SCA), how many distinct methods exist for law enforcement to obtain internet records?",
    options: [
      "Three",
      "Four",
      "Five",
      "Six"
    ],
    answer: 2,
    explanation: "The lecture states there are five ways to obtain internet records under the Stored Communications Act: (1) subpoena, (2) subpoena with notice, (3) court order, (4) court order with notice, and (5) search warrant. Each method involves a different level of judicial oversight and notification to the account holder."
  },
  {
    q: "According to the lecture, at what point should an e-discovery project management plan be created?",
    options: [
      "After all collected discovery files have been reviewed for relevance and privilege",
      "Only once the court has formally set the discovery cut-off deadline",
      "Immediately after the Meet and Confer session with opposing counsel concludes",
      "Before any discovery under an RFP is received by the legal team"
    ],
    answer: 3,
    explanation: "The lecture is clear that the preliminary project management plan — covering team roles, technology, quality controls, vendors, budget, timeline, and case goals — must be created before receiving any discovery under an RFP. When discovery is later received, a chain-of-custody log is then added to the plan."
  },
  {
    q: "Why is running a virus scan during the sampling phase potentially problematic in an e-discovery context?",
    options: [
      "It can alter the metadata of the files being scanned, affecting their forensic integrity",
      "It may permanently destroy encrypted files that are needed as admissible evidence",
      "Courts do not accept any evidence that has previously been subjected to a virus scan",
      "It requires specific prior judicial authorisation before it can be lawfully performed"
    ],
    answer: 0,
    explanation: "The lecture explicitly flags this: virus scanning can alter file metadata. Since metadata — timestamps, authorship, access history — can be critical evidence in litigation, any process that modifies it must be approached with extreme caution. This is why the warning appears as a parenthetical note in the sampling slide."
  },
  {
    q: "What does the e-discovery search tool 'Discovery Attender' allow investigators to do?",
    options: [
      "Import key documents and present them to the jury during courtroom proceedings",
      "Conduct keyword searches across discovery collections without altering file metadata",
      "Generate court-admissible forensic images of hard drives and removable media",
      "Build case chronologies and organise witness and expert lists before trial"
    ],
    answer: 1,
    explanation: "Discovery Attender is categorised in the lecture under Search & Identification tools. Its key feature is that it performs keyword searches without altering metadata — preserving the forensic integrity of files during the search and identification phase of the EDRM workflow."
  },
  {
    q: "What is TrialDirector primarily used for in the e-discovery and litigation workflow?",
    options: [
      "Preserving digital evidence in forensically sound format and maintaining chain of custody",
      "Running large-scale keyword searches across multi-terabyte document collections",
      "Importing key 'hot documents' and presenting evidence visually during trial",
      "Conducting social network link analysis and geospatial mapping of evidence"
    ],
    answer: 2,
    explanation: "TrialDirector is a trial presentation tool. The lecture places it in the Trial Presentation category, describing its function as importing 'hot docs' — the most significant documents — and presenting evidence to judges and juries during courtroom proceedings. It operates at the final Presentation stage of the EDRM."
  },
  {
    q: "Which stages of the Electronic Discovery Reference Model (EDRM) does the lecture's project management section specifically focus on?",
    options: [
      "Information Management → Identification → Preservation → Collection",
      "Identification → Preservation → Collection → Processing",
      "Preservation → Collection → Processing → Review",
      "Processing → Review → Analysis → Production"
    ],
    answer: 3,
    explanation: "The lecture slide on the EDRM explicitly highlights Processing → Review → Analysis → Production as the four stages covered in the project management portion of Lecture 21. The earlier stages (Information Management through Collection) were covered in prior lectures."
  }
];

let answered = 0;
let score = 0;

function buildQuiz() {
  const container = document.getElementById('quiz');
  container.innerHTML = '';
  answered = 0;
  score = 0;
  updateProgress();

  questions.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = `card-${i}`;

    const letters = ['A', 'B', 'C', 'D'];

    card.innerHTML = `
      <div class="q-number">Question ${String(i+1).padStart(2,'0')} / 20</div>
      <div class="q-text">${q.q}</div>
      <div class="options">
        ${q.options.map((opt, j) => `
          <button class="option" data-q="${i}" data-opt="${j}" onclick="selectAnswer(${i},${j})">
            <span class="option-letter">${letters[j]}</span>
            <span>${opt}</span>
          </button>
        `).join('')}
      </div>
      <div class="feedback" id="fb-${i}"></div>
    `;
    container.appendChild(card);
  });

  document.getElementById('score-panel').classList.remove('show');
}

function selectAnswer(qIndex, optIndex) {
  const q = questions[qIndex];
  const card = document.getElementById(`card-${qIndex}`);
  const buttons = card.querySelectorAll('.option');
  const fb = document.getElementById(`fb-${qIndex}`);

  buttons.forEach(b => b.disabled = true);

  const isCorrect = optIndex === q.answer;

  buttons[optIndex].classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) {
    buttons[q.answer].classList.add('reveal-correct');
  }

  card.classList.add('answered', isCorrect ? 'correct-card' : 'wrong-card');

  fb.className = `feedback show ${isCorrect ? 'correct-fb' : 'wrong-fb'}`;
  fb.innerHTML = `${isCorrect ? '✓ Correct' : '✗ Incorrect'} — ${q.explanation}`;

  if (isCorrect) score++;
  answered++;
  updateProgress();

  if (answered === questions.length) {
    setTimeout(showScore, 600);
  }
}

function updateProgress() {
  document.getElementById('prog-label').textContent = `${answered} / 20 answered`;
  document.getElementById('score-label').textContent = `Score: ${score}`;
  document.getElementById('progress-fill').style.width = `${(answered / 20) * 100}%`;
}

function showScore() {
  const panel = document.getElementById('score-panel');
  const pct = Math.round((score / 20) * 100);
  document.getElementById('final-score').textContent = `${score}/20`;

  const badge = document.getElementById('grade-badge');
  let grade, color;
  if (pct >= 90)      { grade = 'Excellent — A'; color = '#00ff87'; }
  else if (pct >= 75) { grade = 'Good — B';       color = '#00e5ff'; }
  else if (pct >= 60) { grade = 'Pass — C';        color = '#ffd700'; }
  else                { grade = 'Needs Revision — F'; color = '#ff4d6d'; }

  badge.textContent = grade;
  badge.style.background = color + '15';
  badge.style.border = `1px solid ${color}`;
  badge.style.color = color;

  panel.classList.add('show');
  panel.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function resetQuiz() {
  buildQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
